server {
    listen 80;
    server_name mybuilding.dev www.mybuilding.dev;

    root /root/mybuilding;
    index index.html;

    # Serve static files directly
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Redirect www → non-www
    if ($host = www.mybuilding.dev) {
        return 301 https://mybuilding.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mybuilding.dev www.mybuilding.dev;

    ssl_certificate     /etc/letsencrypt/live/mybuilding.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybuilding.dev/privkey.pem;

    root /root/mybuilding;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
