server {
    listen 80;
    server_name mybuilding.dev www.mybuilding.dev;

    # Redirect www → non-www + HTTP → HTTPS
    return 301 https://mybuilding.dev$request_uri;
}

server {
    listen 443 ssl;
    server_name mybuilding.dev www.mybuilding.dev;

    ssl_certificate     /etc/letsencrypt/live/mybuilding.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybuilding.dev/privkey.pem;

    root /root/mybuilding;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API proxy → FastAPI port 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Static files
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
