<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mybuilding — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.tabs { display: flex; gap: 2px; background: var(--glass); border: 1px solid var(--border); border-radius: 8px; padding: 3px; width: fit-content; }
.tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; color: var(--t2); transition: all 0.15s; }
.tab.active { background: var(--teal-dim); color: var(--t1); font-weight: 500; }
.filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); color: var(--t2); transition: all 0.15s; background: none; font-family: inherit; }
.filter-chip.active { border-color: var(--teal); color: var(--teal); background: var(--teal-glow); }
.contact-name { font-size: 12px; font-weight: 500; color: var(--t1); }
.contact-sub  { font-size: 10px; color: var(--t3); margin-top: 1px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--teal-dim); border: 1px solid rgba(13,148,136,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--teal); flex-shrink: 0; }
.pipeline-col { display: flex; flex-direction: column; gap: 8px; }
.pipeline-header { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.07em; padding: 6px 10px; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }
.pipeline-card { background: var(--glass); border: 1px solid var(--border); border-radius: 8px; padding: 11px 12px; cursor: pointer; transition: all 0.15s; }
.pipeline-card:hover { border-color: var(--border-h); background: var(--glass-h); }
.pipeline-card-title { font-size: 12px; font-weight: 500; color: var(--t1); margin-bottom: 4px; }
.pipeline-card-meta { font-size: 11px; color: var(--t3); display: flex; align-items: center; justify-content: space-between; }
.kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: start; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>

<!-- ADD CONTACT MODAL -->
<div class="modal" id="contactModal">
  <div class="modal-backdrop" onclick="closeContactModal()"></div>
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-title-text">Nouveau contact</span>
      <button class="modal-close" onclick="closeContactModal()">×</button>
    </div>
    <form id="contactForm" onsubmit="saveContact(event)">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input class="form-input" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" name="email" type="email" placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input class="form-input" name="phone" placeholder="+33 6 00 00 00 00">
        </div>
        <div class="form-group">
          <label class="form-label">Entreprise</label>
          <input class="form-input" name="company" placeholder="Acme Inc.">
        </div>
        <div class="form-group">
          <label class="form-label">Source</label>
          <select class="form-select" name="source">
            <option value="direct">Direct</option>
            <option value="upwork">Upwork</option>
            <option value="referral">Référence</option>
            <option value="other">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Étape</label>
          <select class="form-select" name="stage">
            <option value="lead">Lead</option>
            <option value="proposal">Proposition</option>
            <option value="active">Actif</option>
            <option value="inactive">Inactif</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" name="notes" placeholder="Contexte, besoins, remarques..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-glass" onclick="closeContactModal()">Annuler</button>
        <button type="submit" class="btn btn-teal" id="saveBtn">Créer le contact</button>
      </div>
    </form>
  </div>
</div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="breadcrumb">mybuilding /</span>
      <span class="page-title">CRM</span>
      <span id="contacts-badge" class="teal-chip">—</span>
    </div>
    <div class="topbar-right">
      <input class="search-input" id="search" placeholder="🔍 Rechercher..." oninput="filterContacts()">
      <button class="btn btn-teal" onclick="openContactModal()">+ Contact</button>
    </div>
  </div>

  <div class="content">

    <!-- TABS -->
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('contacts',this)">Contacts</div>
        <div class="tab" onclick="switchTab('pipeline',this)">Pipeline</div>
      </div>
      <div class="filter-row" id="stage-filters">
        <button class="filter-chip active" data-stage="" onclick="setStageFilter('',this)">Tous</button>
        <button class="filter-chip" data-stage="lead" onclick="setStageFilter('lead',this)">Leads</button>
        <button class="filter-chip" data-stage="proposal" onclick="setStageFilter('proposal',this)">Proposition</button>
        <button class="filter-chip" data-stage="active" onclick="setStageFilter('active',this)">Actifs</button>
        <button class="filter-chip" data-stage="inactive" onclick="setStageFilter('inactive',this)">Inactifs</button>
      </div>
    </div>

    <!-- CONTACTS TAB -->
    <div id="tab-contacts" class="tile fade-up">
      <table class="data-table" id="contacts-table">
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th>Contact</th>
            <th>Étape</th>
            <th>Source</th>
            <th>MRR</th>
            <th>Créé</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="contacts-tbody">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">Chargement...</div></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- PIPELINE TAB -->
    <div id="tab-pipeline" style="display:none">
      <div class="kanban" id="kanban-board">
        <div class="empty-state"><div class="empty-text">Chargement...</div></div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/app.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('crm');

var allContacts = [];
var currentStage = '';
var editingId = null;

async function loadContacts() {
  try {
    const { data, error } = await sb.from('contacts').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allContacts = data || [];
    document.getElementById('contacts-badge').textContent = allContacts.length + ' contacts';
    renderContacts();
    renderKanban();
  } catch(e) {
    toast('Erreur chargement contacts', 'error');
  }
}

function filterContacts() {
  renderContacts();
}

function setStageFilter(stage, el) {
  currentStage = stage;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderContacts();
}

function getFiltered() {
  var q = (document.getElementById('search').value || '').toLowerCase();
  return allContacts.filter(c => {
    if (currentStage && c.stage !== currentStage) return false;
    if (q && !((c.name||'').toLowerCase().includes(q) || (c.company||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q))) return false;
    return true;
  });
}

function renderContacts() {
  var rows = getFiltered();
  var tbody = document.getElementById('contacts-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">Aucun contact</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(c => {
    var initials = (c.name || '?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<tr onclick="editContact('${c.id}')">
      <td><div class="avatar">${initials}</div></td>
      <td>
        <div class="contact-name">${c.name}</div>
        <div class="contact-sub">${[c.company, c.email].filter(Boolean).join(' · ') || '—'}</div>
      </td>
      <td>${stageBadge(c.stage)}</td>
      <td class="muted">${c.source || '—'}</td>
      <td class="mono ${c.mrr > 0 ? 'teal' : 'muted'}">${c.mrr > 0 ? fmtEur(c.mrr) : '—'}</td>
      <td class="muted">${fmtDate(c.created_at)}</td>
      <td><button class="btn btn-glass" style="padding:4px 10px;font-size:11px" onclick="editContact('${c.id}');event.stopPropagation()">Éditer</button></td>
    </tr>`;
  }).join('');
}

function renderKanban() {
  var stages = [
    { key: 'prospect',    label: 'Prospect',    color: 'var(--teal)' },
    { key: 'proposal',    label: 'Proposition',  color: 'var(--blue)' },
    { key: 'negotiation', label: 'Négociation',  color: 'var(--amber)' },
    { key: 'active',      label: 'Actif',        color: 'var(--green)' },
    { key: 'won',         label: 'Won ★',        color: 'var(--green)' },
  ];
  // Use contacts grouped by stage for kanban
  var grouped = {};
  stages.forEach(s => { grouped[s.key] = []; });
  allContacts.forEach(c => { if (grouped[c.stage]) grouped[c.stage].push(c); });

  document.getElementById('kanban-board').innerHTML = stages.map(s => `
    <div class="pipeline-col">
      <div class="pipeline-header" style="background:rgba(255,255,255,0.03)">
        <span style="color:${s.color}">${s.label}</span>
        <span class="muted">${grouped[s.key].length}</span>
      </div>
      ${grouped[s.key].map(c => `
        <div class="pipeline-card" onclick="editContact('${c.id}')">
          <div class="pipeline-card-title">${c.name}</div>
          <div class="pipeline-card-meta">
            <span>${c.company || c.email || '—'}</span>
            ${c.mrr > 0 ? '<span class="teal mono">' + fmtEur(c.mrr) + '/m</span>' : ''}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-contacts').style.display = tab === 'contacts' ? '' : 'none';
  document.getElementById('tab-pipeline').style.display = tab === 'pipeline' ? '' : 'none';
  document.getElementById('stage-filters').style.display = tab === 'contacts' ? '' : 'none';
}

function openContactModal(contact) {
  editingId = contact ? contact.id : null;
  var form = document.getElementById('contactForm');
  form.reset();
  document.getElementById('modal-title-text').textContent = contact ? 'Éditer le contact' : 'Nouveau contact';
  document.getElementById('saveBtn').textContent = contact ? 'Sauvegarder' : 'Créer le contact';
  if (contact) {
    ['name','email','phone','company','source','stage','notes'].forEach(k => {
      var el = form.elements[k];
      if (el) el.value = contact[k] || '';
    });
  }
  document.getElementById('contactModal').classList.add('open');
}

function closeContactModal() {
  document.getElementById('contactModal').classList.remove('open');
  editingId = null;
}

function editContact(id) {
  var c = allContacts.find(x => x.id === id);
  if (c) openContactModal(c);
}

async function saveContact(e) {
  e.preventDefault();
  var form = e.target;
  var data = {
    name:    form.name.value,
    email:   form.email.value || null,
    phone:   form.phone.value || null,
    company: form.company.value || null,
    source:  form.source.value,
    stage:   form.stage.value,
    notes:   form.notes.value || null,
  };
  try {
    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '...';
    if (editingId) {
      var { error } = await sb.from('contacts').update(data).eq('id', editingId);
      if (error) throw error;
      toast('Contact mis à jour');
    } else {
      var { error } = await sb.from('contacts').insert(data);
      if (error) throw error;
      toast('Contact créé ✓');
    }
    closeContactModal();
    await loadContacts();
  } catch(err) {
    toast(err.message || 'Erreur', 'error');
  } finally {
    var btn = document.getElementById('saveBtn');
    btn.disabled = false;
    btn.textContent = editingId ? 'Sauvegarder' : 'Créer le contact';
  }
}

loadContacts();
</script>
</body>
</html>
