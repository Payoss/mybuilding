<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Detail | mybuilding · Upwork CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
/* ── Job Detail Page ── */
.jd-content { padding: 20px 28px 60px; max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

/* ── Back button ── */
.jd-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--t3); cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.15s; padding: 0; }
.jd-back:hover { color: var(--teal); }

/* ── Hero Card ── */
.jd-hero { background: var(--glass); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; backdrop-filter: blur(12px); animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }
.jd-hero-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
.jd-hero-info { flex: 1; min-width: 0; }
.jd-hero-title { font-size: 18px; font-weight: 700; color: var(--t1); line-height: 1.35; margin-bottom: 8px; }
.jd-hero-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: var(--t2); }
.jd-hero-meta span { display: flex; align-items: center; gap: 4px; }
.jd-hero-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ── Badges ── */
.jd-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.jd-badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
.jd-badge-go { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.jd-badge-maybe { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
.jd-badge-skip { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.jd-badge-sniper { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); animation: sniperPulse 2s ease-in-out infinite; }
.jd-badge-fr { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(147,197,253,0.3); }

/* ── Score Boxes ── */
.jd-scores { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; animation: fadeUp 0.35s 0.05s cubic-bezier(0.16,1,0.3,1) both; }
.jd-score-box { background: var(--glass); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; backdrop-filter: blur(12px); transition: border-color 0.15s; }
.jd-score-box:hover { border-color: var(--border-h); }
.jd-score-label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 600; }
.jd-score-val { font-size: 24px; font-weight: 800; font-family: 'DM Mono', monospace; }
.jd-score-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.jd-score-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }

/* ── Two Column Layout ── */
.jd-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Card generic ── */
.jd-card { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 18px; backdrop-filter: blur(12px); }
.jd-card-title { font-size: 12px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.jd-card-full { grid-column: 1 / -1; }

/* ── Skills Tags ── */
.jd-skills { display: flex; gap: 6px; flex-wrap: wrap; }
.jd-skill { font-size: 10px; padding: 3px 9px; border-radius: 10px; background: var(--teal-glow); border: 1px solid rgba(45,212,191,0.2); color: var(--teal); font-weight: 500; }

/* ── Description ── */
.jd-desc { font-size: 12px; color: var(--t2); line-height: 1.65; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }
.jd-desc::-webkit-scrollbar { width: 3px; }
.jd-desc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Enrichment sections ── */
.jd-enrich-loader { display: flex; align-items: center; gap: 10px; padding: 16px; font-size: 12px; color: var(--t3); }
.jd-enrich-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.jd-why { font-size: 13px; color: var(--t1); line-height: 1.6; }

/* ── Battle Card ── */
.jd-battle-section { margin-bottom: 10px; }
.jd-battle-label { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.jd-battle-list { list-style: none; padding: 0; }
.jd-battle-list li { font-size: 12px; color: var(--t2); padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; }
.jd-battle-list li::before { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.jd-battle-strengths li::before { background: var(--green); }
.jd-battle-risks li::before { background: var(--red); }
.jd-battle-diff li::before { background: var(--teal); }

/* ── Plan d'exécution — horizontal grid ── */
.jd-plan-timeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.jd-plan-step { position: relative; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.jd-plan-dot { display: none; }
.jd-plan-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.jd-plan-num { font-size: 10px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.05em; }
.jd-plan-time { font-size: 10px; font-weight: 600; color: var(--t3); font-family: 'DM Mono', monospace; background: var(--glass); padding: 1px 7px; border-radius: 4px; border: 1px solid var(--border); }
.jd-plan-title { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
.jd-plan-desc { font-size: 11px; color: var(--t2); line-height: 1.5; margin-bottom: 4px; }
.jd-plan-tools { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }
.jd-plan-tool { font-size: 9px; background: var(--teal-glow); color: var(--teal); padding: 1px 6px; border-radius: 4px; font-weight: 500; border: 1px solid rgba(45,212,191,0.15); }
.jd-plan-deliverable { font-size: 10px; color: var(--green); font-weight: 500; }

/* ── Generate Zone ── */
.jd-generate-zone { animation: fadeUp 0.35s 0.15s cubic-bezier(0.16,1,0.3,1) both; }
.jd-generate-btn { width: 100%; padding: 14px; background: var(--teal); color: white; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 0 24px rgba(45,212,191,0.3); }
.jd-generate-btn:hover:not(:disabled) { opacity: 0.9; box-shadow: 0 0 32px rgba(45,212,191,0.45); }
.jd-generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── Generation Progress ── */
.gen-progress { display: none; width: 100%; padding: 20px 0 8px; }
.gen-progress.visible { display: block; animation: fadeUp 0.3s ease; }
.gen-steps { display: flex; justify-content: space-between; position: relative; margin-bottom: 12px; }
.gen-step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; z-index: 1; }
.gen-step-dot { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); }
.gen-step.done .gen-step-dot { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 12px rgba(45,212,191,0.5); }
.gen-step.active .gen-step-dot { background: rgba(45,212,191,0.2); border-color: var(--teal); animation: pulse-dot 1.5s ease infinite; }
.gen-step-label { font-size: 10px; color: var(--t3); font-weight: 500; transition: color 0.3s; white-space: nowrap; }
.gen-step.done .gen-step-label, .gen-step.active .gen-step-label { color: var(--teal); }
.gen-track { position: relative; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.gen-track-fill { height: 100%; background: linear-gradient(90deg, var(--teal), rgba(45,212,191,0.6)); border-radius: 2px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); width: 0%; }
.gen-elapsed { text-align: center; margin-top: 8px; font-size: 11px; color: var(--t3); }
@keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 6px rgba(45,212,191,0.3); } 50% { box-shadow: 0 0 16px rgba(45,212,191,0.6); } }

/* ── Cover Letter Results ── */
.jd-cover-results { display: none; margin-top: 14px; }
.jd-cover-results.visible { display: block; animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }
.jd-cover-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.jd-cover-tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.15s; color: var(--t3); background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
.jd-cover-tab.active { background: var(--teal-dim); color: var(--teal); border-color: rgba(45,212,191,0.3); }
.jd-cover-panel { display: none; }
.jd-cover-panel.active { display: block; }
.jd-cover-text { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 14px; color: var(--t1); font-size: 12px; font-family: inherit; line-height: 1.65; resize: vertical; min-height: 200px; outline: none; transition: border-color 0.15s; }
.jd-cover-text:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(45,212,191,0.12); }
.jd-cover-actions { display: flex; gap: 8px; margin-top: 8px; }
.jd-copy-btn { background: var(--teal-glow); border: 1px solid rgba(45,212,191,0.3); color: var(--teal); font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.jd-copy-btn:hover { background: rgba(45,212,191,0.22); }
.jd-copy-btn.copied { background: var(--green-bg); border-color: rgba(34,197,94,0.3); color: var(--green); }

/* ── Description FR ── */
.jd-desc-fr { font-size: 12px; color: var(--t2); line-height: 1.6; white-space: pre-wrap; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .jd-columns { grid-template-columns: 1fr; }
  .jd-scores { grid-template-columns: 1fr 1fr; }
  .jd-content { padding: 12px 14px 40px; }
  .jd-hero-top { flex-direction: column; }
  .jd-hero-actions { width: 100%; }
}
@media (max-width: 768px) {
  .jd-scores { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<script src="/js/auth.js"></script>

<div id="sidebar-mount"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="breadcrumb">Upwork</span>
      <span style="color:var(--t3)">›</span>
      <span class="page-title" id="jd-topbar-title">Job Detail</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-glass jd-back" onclick="window.location.href='/upwork.html'">← Retour</button>
    </div>
  </div>

  <div class="jd-content" id="jd-main">
    <!-- Loader initial -->
    <div class="jd-enrich-loader" id="jd-page-loader">
      <div class="jd-enrich-spinner"></div>
      <span>Chargement du job...</span>
    </div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/app.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('upwork');

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var _job = null;
var _enrichment = null;

// ══════════════════════════════════════════════════════════════
// INIT — Load job from URL param
// ══════════════════════════════════════════════════════════════
(async function init() {
  var params = new URLSearchParams(window.location.search);
  var jobId = params.get('id');
  if (!jobId) { window.location.href = '/upwork.html'; return; }

  try {
    var res = await sb.from('upwork_jobs').select('*').eq('id', jobId).single();
    if (!res.data) { toast('Job introuvable', 'error'); setTimeout(function() { window.location.href = '/upwork.html'; }, 1500); return; }
    _job = res.data;
    document.getElementById('jd-topbar-title').textContent = _job.title || 'Job Detail';
    document.title = (_job.title || 'Job') + ' | mybuilding';
    renderPage();
  } catch(e) {
    toast('Erreur chargement: ' + e.message, 'error');
  }
})();

// ══════════════════════════════════════════════════════════════
// RENDER — Full page
// ══════════════════════════════════════════════════════════════
function renderPage() {
  var j = _job;
  var feas = j.feasibility || 0;
  var worth = j.worth_score || 0;
  var feasColor = feas >= 80 ? 'var(--green)' : feas >= 55 ? 'var(--amber)' : 'var(--red)';
  var worthColor = worth >= 8 ? 'var(--green)' : worth >= 6 ? 'var(--amber)' : 'var(--red)';

  // Verdict
  var verdictText, verdictClass;
  if (j.sniper_mode) { verdictText = '🎯 SNIPER. Postuler immediatement'; verdictClass = 'jd-badge-sniper'; }
  else if (worth >= 8) { verdictText = '✓ GO. Excellent match'; verdictClass = 'jd-badge-go'; }
  else if (worth >= 6) { verdictText = '~ MAYBE. A evaluer'; verdictClass = 'jd-badge-maybe'; }
  else { verdictText = '✕ SKIP. Pas assez rentable'; verdictClass = 'jd-badge-skip'; }

  // Budget
  var budgetStr = formatBudget(j);
  var timeStr = j.time_estimate || '';
  var postedStr = j.posted_at ? new Date(j.posted_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

  // Status
  var statusLabels = { new: '● Nouveau', applied: '✓ Postule', skipped: '✕ Passe', interviewing: '⟳ Entretien', won: '★ Won', lost: '✗ Lost' };

  var html = ''
    // Back
    + '<button class="jd-back" onclick="window.location.href=\'/upwork.html\'">← Retour a la liste</button>'

    // Hero
    + '<div class="jd-hero">'
    + '<div class="jd-badges">'
    + '<span class="jd-badge ' + verdictClass + '">' + verdictText + '</span>'
    + (j.sniper_mode ? '<span class="jd-badge jd-badge-sniper">🎯 SNIPER</span>' : '')
    + (j.is_french ? '<span class="jd-badge jd-badge-fr">🇫🇷 France</span>' : '')
    + '</div>'
    + '<div class="jd-hero-top">'
    + '<div class="jd-hero-info">'
    + '<div class="jd-hero-title">' + escHtml(j.title || 'Sans titre') + '</div>'
    + '<div class="jd-hero-meta">'
    + '<span>💰 ' + budgetStr + '</span>'
    + (j.budget_type ? '<span>📋 ' + j.budget_type + '</span>' : '')
    + (j.country ? '<span>📍 ' + escHtml(j.country) + '</span>' : '')
    + (timeStr ? '<span>⏱ ' + timeStr + '</span>' : '')
    + (postedStr ? '<span>📅 ' + postedStr + '</span>' : '')
    + '<span>📊 ' + (statusLabels[j.status] || j.status || 'Nouveau') + '</span>'
    + '</div>'
    + '</div>'
    + '<div class="jd-hero-actions">'
    + (j.url ? '<button class="btn btn-teal" onclick="window.open(\'' + escAttr(j.url) + '\',\'_blank\')">↗ Upwork</button>' : '')
    + '<button class="btn btn-glass" id="btn-applied" onclick="markStatus(\'applied\')">✓ Postule</button>'
    + '<button class="btn btn-danger" onclick="markStatus(\'skipped\')">✕ Passer</button>'
    + '</div>'
    + '</div>'
    + '</div>'

    // Score boxes
    + '<div class="jd-scores">'
    + scoreBox('Faisabilite', feas + '%', feas, feasColor)
    + scoreBox('Worth Score', worth + '/10', worth * 10, worthColor)
    + scoreBox('Budget', budgetStr, null, 'var(--teal)')
    + scoreBox('Temps estime', timeStr || '—', null, 'var(--blue)')
    + '</div>'

    // Contact card (async-filled by loadLinkedContact)
    + '<div id="jd-contact-card" style="margin-bottom:12px"></div>'

    // Generate Zone (right after scores)
    + '<div class="jd-generate-zone jd-card">'
    + '<div class="jd-card-title">✦ Candidature</div>'
    + '<div id="generate-zone-inner">'
    + '<button class="jd-generate-btn" id="generateBtn" onclick="generateCoverLetter()">✦ Generer ma candidature (Version A + B)</button>'
    + '<div class="gen-progress" id="genProgress">'
    + '<div class="gen-steps">'
    + '<div class="gen-step" id="gs-0"><div class="gen-step-dot">1</div><div class="gen-step-label">Analyse</div></div>'
    + '<div class="gen-step" id="gs-1"><div class="gen-step-dot">2</div><div class="gen-step-label">Version A</div></div>'
    + '<div class="gen-step" id="gs-2"><div class="gen-step-dot">3</div><div class="gen-step-label">Version B</div></div>'
    + '<div class="gen-step" id="gs-3"><div class="gen-step-dot">4</div><div class="gen-step-label">Finalisation</div></div>'
    + '</div>'
    + '<div class="gen-track"><div class="gen-track-fill" id="genTrackFill"></div></div>'
    + '<div class="gen-elapsed" id="genElapsed">0s</div>'
    + '</div>'
    + '</div>'
    + '<div class="jd-cover-results" id="coverResults"></div>'
    + '</div>'

    // Enrich progress tracker
    + '<div class="gen-progress visible" id="enrichProgress">'
    + '<div class="gen-steps">'
    + '<div class="gen-step active" id="es-0"><div class="gen-step-dot">1</div><div class="gen-step-label">Analyse</div></div>'
    + '<div class="gen-step" id="es-1"><div class="gen-step-dot">2</div><div class="gen-step-label">Traduction</div></div>'
    + '<div class="gen-step" id="es-2"><div class="gen-step-dot">3</div><div class="gen-step-label">Battle Card</div></div>'
    + '<div class="gen-step" id="es-3"><div class="gen-step-dot">4</div><div class="gen-step-label">Plan</div></div>'
    + '</div>'
    + '<div class="gen-track"><div class="gen-track-fill" id="enrichTrackFill"></div></div>'
    + '<div class="gen-elapsed" id="enrichElapsed">0s</div>'
    + '</div>'

    // Two columns
    + '<div class="jd-columns">'

    // Left column
    + '<div style="display:flex;flex-direction:column;gap:14px">'
    // Skills
    + '<div class="jd-card">'
    + '<div class="jd-card-title">🏷 Skills</div>'
    + renderSkills(j.skills)
    + '</div>'
    // Pourquoi pour toi
    + '<div class="jd-card" id="card-why">'
    + '<div class="jd-card-title">🎯 Pourquoi pour toi</div>'
    + '<div id="why-content"></div>'
    + '</div>'
    // Battle Card
    + '<div class="jd-card" id="card-battle">'
    + '<div class="jd-card-title">⚔ Battle Card</div>'
    + '<div id="battle-content"></div>'
    + '</div>'
    + '</div>'

    // Right column
    + '<div style="display:flex;flex-direction:column;gap:14px">'
    // Description
    + '<div class="jd-card">'
    + '<div class="jd-card-title">📄 Description originale' + (j.description_full ? ' <span style="font-size:11px;color:#2dd4bf;font-weight:400">✓ complète</span>' : ' <span style="font-size:11px;color:#888;font-weight:400">snippet</span>') + '</div>'
    + '<div class="jd-desc" id="desc-original">' + ((j.description_full || j.description) ? escHtml(j.description_full || j.description).replace(/\n/g, '<br>') : '<span class="muted">Pas de description — ouvre le job sur Upwork pour l\'extraire automatiquement</span>') + '</div>'
    + '</div>'
    // Description FR
    + '<div class="jd-card" id="card-desc-fr">'
    + '<div class="jd-card-title">🇫🇷 Description traduite</div>'
    + '<div id="descfr-content"></div>'
    + '</div>'
    + '</div>'

    // Plan d'execution — full width under both columns
    + '<div class="jd-card jd-card-full" id="card-plan">'
    + '<div class="jd-card-title">📋 Plan d\'execution</div>'
    + '<div id="plan-content"></div>'
    + '</div>'

    + '</div>'; // end columns

  document.getElementById('jd-main').innerHTML = html;

  // Load linked contact
  loadLinkedContact();

  // Trigger enrichment
  loadEnrichment();

  // If cover letters already exist in DB, show them
  if (j.cover_letter || j.cover_letter_b) {
    showExistingCovers(j.cover_letter, j.cover_letter_b);
  }
}

// ── Linked contact card ──
async function loadLinkedContact() {
  var j = _job;
  if (!j) return;
  var div = document.getElementById('jd-contact-card');
  if (!div) return;

  var contact = null;
  try {
    var q = sb.from('contacts').select('*').limit(1);
    if (j.id) q = q.or('upwork_job_id.eq.'+j.id+(j.url?',upwork_url.eq.'+j.url:''));
    else if (j.url) q = q.eq('upwork_url', j.url);
    var { data } = await q;
    contact = (data && data[0]) || null;
  } catch(e) { /* fallback gracefully */ }

  if (contact) {
    var init = (contact.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    div.innerHTML =

function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function escAttr(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function formatBudget(j) {
  if (!j.budget_min && !j.budget_max) return '—';
  var bmin = j.budget_min || 0, bmax = j.budget_max || bmin;
  var s = '$' + (bmin >= 1000 ? (bmin/1000).toFixed(1)+'K' : bmin);
  if (bmax !== bmin) s += ' – $' + (bmax >= 1000 ? (bmax/1000).toFixed(1)+'K' : bmax);
  if (j.budget_type === 'hourly') s += '/h';
  return s;
}

function scoreBox(label, value, pct, color) {
  var bar = pct != null
    ? '<div class="jd-score-bar"><div class="jd-score-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
    : '';
  return '<div class="jd-score-box">'
    + '<div class="jd-score-label">' + label + '</div>'
    + '<div class="jd-score-val" style="color:' + color + '">' + value + '</div>'
    + bar
    + '</div>';
}

function renderSkills(skills) {
  var arr = (skills || []).filter(function(s) {
    // Filter out noise from scraper (location, payment info etc)
    return s && !/^(Location|Unverified|Payment|\$\d)/.test(s);
  });
  if (!arr.length) return '<span class="muted" style="font-size:12px">Aucun skill detecte</span>';
  return '<div class="jd-skills">' + arr.map(function(s) { return '<span class="jd-skill">' + escHtml(s) + '</span>'; }).join('') + '</div>';
}

// ══════════════════════════════════════════════════════════════
var _enrichTimer = null;
var _enrichElapsedTimer = null;
var _enrichStart = 0;

function startEnrichProgress() {
  _enrichStart = Date.now();
  setEnrichStep(0);
  var stepTimes = [0, 12000, 24000, 36000];
  _enrichTimer = setInterval(function() {
    var elapsed = Date.now() - _enrichStart;
    if (elapsed > stepTimes[3]) setEnrichStep(3);
    else if (elapsed > stepTimes[2]) setEnrichStep(2);
    else if (elapsed > stepTimes[1]) setEnrichStep(1);
    var pct = Math.min(95, (elapsed / 50000) * 100);
    document.getElementById('enrichTrackFill').style.width = pct + '%';
  }, 500);
  _enrichElapsedTimer = setInterval(function() {
    var s = Math.floor((Date.now() - _enrichStart) / 1000);
    document.getElementById('enrichElapsed').textContent = s + 's';
  }, 1000);
}

function setEnrichStep(idx) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('es-' + i);
    el.classList.remove('done', 'active');
    if (i < idx) { el.classList.add('done'); el.querySelector('.gen-step-dot').textContent = '✓'; }
    else if (i === idx) el.classList.add('active');
  }
}

function stopEnrichProgress(success) {
  if (_enrichTimer) { clearInterval(_enrichTimer); _enrichTimer = null; }
  if (_enrichElapsedTimer) { clearInterval(_enrichElapsedTimer); _enrichElapsedTimer = null; }
  var ep = document.getElementById('enrichProgress');
  if (success) {
    for (var i = 0; i < 4; i++) {
      var el = document.getElementById('es-' + i);
      el.classList.remove('active'); el.classList.add('done');
      el.querySelector('.gen-step-dot').textContent = '✓';
    }
    document.getElementById('enrichTrackFill').style.width = '100%';
    var s = Math.floor((Date.now() - _enrichStart) / 1000);
    document.getElementById('enrichElapsed').textContent = 'Termine en ' + s + 's';
    setTimeout(function() { ep.classList.remove('visible'); }, 1200);
  } else {
    ep.classList.remove('visible');
  }
}

async function loadEnrichment() {
  // Check cache in job.analysis.enrichment
  if (_job.analysis && _job.analysis.enrichment) {
    _enrichment = _job.analysis.enrichment;
    document.getElementById('enrichProgress').classList.remove('visible');
    renderEnrichment(_enrichment);
    return;
  }

  // Start progress
  startEnrichProgress();

  // Call API
  try {
    var res = await fetch('/api/job-enrich', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: _job.title,
        description: _job.description_full || _job.description,
        skills: (_job.skills || []).filter(function(s) { return s && !/^(Location|Unverified|Payment|\$\d)/.test(s); }),
        budget_min: _job.budget_min,
        budget_max: _job.budget_max,
        budget_type: _job.budget_type,
        country: _job.country,
        feasibility: _job.feasibility,
        worth_score: _job.worth_score,
        time_estimate: _job.time_estimate
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    _enrichment = await res.json();

    // Cache in Supabase
    var updatedAnalysis = Object.assign({}, _job.analysis || {}, { enrichment: _enrichment });
    await sb.from('upwork_jobs').update({ analysis: updatedAnalysis }).eq('id', _job.id);
    _job.analysis = updatedAnalysis;

    stopEnrichProgress(true);
    renderEnrichment(_enrichment);
    // worth >= 8 → pre-generate cover letter silently in background
    maybePregenCovers();
  } catch(e) {
    console.error('Enrichment error:', e);
    stopEnrichProgress(false);
    var fallback = '<span class="muted" style="font-size:12px">Enrichissement indisponible. L\'API n\'est pas accessible.</span>';
    document.getElementById('why-content').innerHTML = fallback;
    document.getElementById('battle-content').innerHTML = fallback;
    document.getElementById('plan-content').innerHTML = fallback;
    document.getElementById('descfr-content').innerHTML = fallback;
  }
}

function renderEnrichment(e) {

  document.getElementById('why-content').innerHTML = '<div class="jd-why">' + escHtml(e.why_for_you || '').replace(/\n/g, '<br>') + '</div>';

  var battleHtml = '';

    }

      battleHtml += '<div class="jd-battle-section"><div class="jd-battle-label">⚠ Risques</div><ul class="jd-battle-list jd-battle-risks">'
        + bc.risks.map(function(s) { return '<li>' + escHtml(s) + '</li>'; }).join('') + '</ul></div>';
    }
    if (bc.differentiators && bc.differentiators.length) {
      battleHtml += '<div class="jd-battle-section"><div class="jd-battle-label">⚡ Differenciateurs</div><ul class="jd-battle-list jd-battle-diff">'
        + bc.differentiators.map(function(s) { return '<li>' + escHtml(s) + '</li>'; }).join('') + '</ul></div>';
    }
  }
  document.getElementById('battle-content').innerHTML = battleHtml || '<span class="muted" style="font-size:12px">Aucune donnee</span>';

  // Execution plan
  if (e.execution_plan && e.execution_plan.length) {
    var planHtml = '<div class="jd-plan-timeline">';
    e.execution_plan.forEach(function(step, i) {
      planHtml += '<div class="jd-plan-step">'
        + '<div class="jd-plan-dot"></div>'
        + '<div class="jd-plan-header">'
        + '<span class="jd-plan-num">Etape ' + (i + 1) + '</span>'
        + '<span class="jd-plan-time">' + escHtml(step.hours || '') + '</span>'
        + '</div>'
        + '<div class="jd-plan-title">' + escHtml(step.title || '') + '</div>'
        + '<div class="jd-plan-desc">' + escHtml(step.description || '') + '</div>'
        + (step.tools && step.tools.length ? '<div class="jd-plan-tools">' + step.tools.map(function(t) { return '<span class="jd-plan-tool">' + escHtml(t) + '</span>'; }).join('') + '</div>' : '')
        + (step.deliverable ? '<div class="jd-plan-deliverable">→ ' + escHtml(step.deliverable) + '</div>' : '')
        + '</div>';
    });
    planHtml += '</div>';
    document.getElementById('plan-content').innerHTML = planHtml;
  } else {

  // Description FR
  document.getElementById('descfr-content').innerHTML = e.description_fr

    : '<span class="muted" style="font-size:12px">Traduction indisponible</span>';
}

// COVER LETTER GENERATION
// ══════════════════════════════════════════════════════════════
var _genTimer = null;
var _genElapsedTimer = null;
var _genStart = 0;

// Pre-generation cache for worth >= 8 jobs
var _pregenCovers = null;  // {version_a, version_b} if pre-generated
var _pregenPromise = null; // Promise in flight

// Triggered automatically after enrichment if worth_score >= 8
async function maybePregenCovers() {
  if ((_job.worth_score || 0) < 8) return;
  if (_job.cover_letter || _job.cover_letter_b) return; // already in DB
  if (_pregenCovers || _pregenPromise) return; // already running

  var skills = (_job.skills || []).filter(function(s) { return s && !/^(Location|Unverified|Payment|\$\d)/.test(s); });

  _pregenPromise = (async function() {
    try {
      var res = await fetch('/api/cover-letter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: _job.title,
          description: _job.description_full || _job.description,
          skills: skills,
          budget_min: _job.budget_min,
          budget_max: _job.budget_max,
          budget_type: _job.budget_type,
          country: _job.country,
          enrichment: _enrichment
        })
      });
      if (!res.ok) return;
      // Stream response — accumulate full text then parse JSON
      var text = await _readStream(res, null); // no live display for pregen
      text = text.replace(/\u2014/g, ',').replace(/\u2013/g, ',');
      var start = text.indexOf('{'), end = text.lastIndexOf('}') + 1;
      if (start === -1 || end === 0) return;
      var data = JSON.parse(text.slice(start, end));
      _pregenCovers = { version_a: data.version_a, version_b: data.version_b };
    } catch(e) {
      console.warn('[pregen] failed silently:', e.message);
    }
  })();
}

// Read a streaming response, optionally writing tokens live into a textarea
// Protocol: server streams raw text chunks, ends with "\n__RESULT__:{full json}"
async function _readStream(response, liveTargets) {
  var reader = response.body.getReader();
  var decoder = new TextDecoder();
  var full = '';
  var liveDisplay = '';

  while (true) {
    var _ref = await reader.read();
    var done = _ref.done, value = _ref.value;
    if (done) break;
    var chunk = decoder.decode(value, { stream: true });
    full += chunk;

    // Live display — extract version_a text from partial JSON stream
    if (liveTargets && liveTargets.a) {
      liveDisplay += chunk;
      // Stop at __RESULT__ marker
      var resultIdx = liveDisplay.indexOf('\n__RESULT__:');
      var raw = resultIdx !== -1 ? liveDisplay.slice(0, resultIdx) : liveDisplay;
      // Extract text inside "version_a": "..." from partial JSON
      var vaIdx = raw.indexOf('"version_a"');
      if (vaIdx !== -1) {
        var colonIdx = raw.indexOf('"', vaIdx + 12); // skip : "
        if (colonIdx !== -1) {
          var textStart = colonIdx + 1;
          // Find end: next unescaped " or end of buffer
          var extractedText = '';
          for (var ci = textStart; ci < raw.length; ci++) {
            if (raw[ci] === '\\' && ci + 1 < raw.length) { ci++; continue; }
            if (raw[ci] === '"') break;
            extractedText += raw[ci];
          }
          // Unescape \n
          extractedText = extractedText.replace(/\\n/g, '\n');
          if (extractedText.length > 0) {
            liveTargets.a.value = extractedText;
          }
        }
      }
    }
  }

  // Extract final JSON from __RESULT__ marker (most reliable)
  var resultMarker = full.indexOf('\n__RESULT__:');
  if (resultMarker !== -1) {
    return full.slice(resultMarker + '\n__RESULT__:'.length);
  }
  return full;
}

function startGenProgress() {
  var progress = document.getElementById('genProgress');
  progress.classList.add('visible');
  _genStart = Date.now();

  // Step 0 = active immediately
  setGenStep(0);

  // Simulate progression based on typical ~40s total
  var stepTimes = [0, 10000, 22000, 35000]; // ms when each step activates
  _genTimer = setInterval(function() {
    var elapsed = Date.now() - _genStart;
    if (elapsed > stepTimes[3]) setGenStep(3);
    else if (elapsed > stepTimes[2]) setGenStep(2);
    else if (elapsed > stepTimes[1]) setGenStep(1);
    // Update progress bar smoothly
    var pct = Math.min(95, (elapsed / 45000) * 100);
    document.getElementById('genTrackFill').style.width = pct + '%';
  }, 500);

  // Elapsed timer
  _genElapsedTimer = setInterval(function() {
    var s = Math.floor((Date.now() - _genStart) / 1000);
    document.getElementById('genElapsed').textContent = s + 's';
  }, 1000);
}

function setGenStep(idx) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('gs-' + i);
    el.classList.remove('done', 'active');
    if (i < idx) { el.classList.add('done'); el.querySelector('.gen-step-dot').textContent = '✓'; }
    else if (i === idx) el.classList.add('active');
  }
}

function stopGenProgress(success) {
  if (_genTimer) { clearInterval(_genTimer); _genTimer = null; }
  if (_genElapsedTimer) { clearInterval(_genElapsedTimer); _genElapsedTimer = null; }
  if (success) {
    // All steps done
    for (var i = 0; i < 4; i++) {
      var el = document.getElementById('gs-' + i);
      el.classList.remove('active');
      el.classList.add('done');
      el.querySelector('.gen-step-dot').textContent = '✓';
    }
    document.getElementById('genTrackFill').style.width = '100%';
    var s = Math.floor((Date.now() - _genStart) / 1000);
    document.getElementById('genElapsed').textContent = 'Termine en ' + s + 's';
  }
}

async function generateCoverLetter() {
  var btn = document.getElementById('generateBtn');
  btn.style.display = 'none';
  startGenProgress();

  var skills = (_job.skills || []).filter(function(s) { return s && !/^(Location|Unverified|Payment|\$\d)/.test(s); });

  try {
    var versionA, versionB;

    // ── CASE 1: Pre-generated (worth >= 8, already done in background) ──
    if (_pregenCovers) {
      versionA = _pregenCovers.version_a;
      versionB = _pregenCovers.version_b;
      stopGenProgress(true);
      setTimeout(function() {
        document.getElementById('genProgress').classList.remove('visible');
        showCovers(versionA, versionB);
        toast('Candidatures pretes instantanement ⚡');
      }, 200);
      // Save to Supabase async (don't await)
      sb.from('upwork_jobs').update({ cover_letter: versionA, cover_letter_b: versionB }).eq('id', _job.id);
      _job.cover_letter = versionA;
      _job.cover_letter_b = versionB;
      return;
    }

    // ── CASE 2: Pre-gen in flight — wait for it ──
    if (_pregenPromise) {
      await _pregenPromise;
      if (_pregenCovers) {
        versionA = _pregenCovers.version_a;
        versionB = _pregenCovers.version_b;
        stopGenProgress(true);
        setTimeout(function() {
          document.getElementById('genProgress').classList.remove('visible');
          showCovers(versionA, versionB);
          toast('Candidatures pretes ⚡');
        }, 200);
        sb.from('upwork_jobs').update({ cover_letter: versionA, cover_letter_b: versionB }).eq('id', _job.id);
        _job.cover_letter = versionA;
        _job.cover_letter_b = versionB;
        return;
      }
    }

    // ── CASE 3: No enrichment — full-pipeline (Groq enrich ~1s + Sonnet stream) ──
    if (!_enrichment) {
      var res = await fetch('/api/full-pipeline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: _job.title, description: _job.description_full || _job.description, skills: skills,
          budget_min: _job.budget_min, budget_max: _job.budget_max,
          budget_type: _job.budget_type, country: _job.country
        })
      });
      if (!res.ok) throw new Error('API error ' + res.status);

      // Full-pipeline streams: "ANALYSIS:{...}\nCOVER:{tokens...}"
      var rawText = await _readStream(res, null);
      var analysisMatch = rawText.match(/^ANALYSIS:(\{[\s\S]*?\})\n/);
      var coverText = rawText.replace(/^ANALYSIS:\{[\s\S]*?\}\n/, '').replace(/^COVER:/, '');

      if (analysisMatch) {
        try {
          var fullData = JSON.parse(analysisMatch[1]);
          if (fullData.enrichment) {
            _enrichment = fullData.enrichment;
            var updatedAnalysis = Object.assign({}, _job.analysis || {}, { enrichment: fullData.enrichment });
            sb.from('upwork_jobs').update({ analysis: updatedAnalysis }).eq('id', _job.id);
            _job.analysis = updatedAnalysis;
            renderEnrichment(_enrichment);
          }
        } catch(e) { console.warn('analysis parse error', e); }
      }

      coverText = coverText.replace(/\u2014/g, ',').replace(/\u2013/g, ',');
      var start = coverText.indexOf('{'), end = coverText.lastIndexOf('}') + 1;
      if (start !== -1 && end > 0) {
        var covers = JSON.parse(coverText.slice(start, end));
        versionA = covers.version_a;
        versionB = covers.version_b;
      }

    } else {
      // ── CASE 4: Enrichment cached — stream cover letter (Sonnet) ──
      // Show live streaming textareas immediately
      showStreamingCovers();
      setGenStep(2);

      var res = await fetch('/api/cover-letter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: _job.title, description: _job.description_full || _job.description, skills: skills,
          budget_min: _job.budget_min, budget_max: _job.budget_max,
          budget_type: _job.budget_type, country: _job.country,
          enrichment: _enrichment
        })
      });
      if (!res.ok) throw new Error('API error ' + res.status);

      var taA = document.getElementById('stream-cover-a');
      var rawText = await _readStream(res, { a: taA });
      rawText = rawText.replace(/\u2014/g, ',').replace(/\u2013/g, ',');
      var start = rawText.indexOf('{'), end = rawText.lastIndexOf('}') + 1;
      if (start !== -1 && end > 0) {
        var data = JSON.parse(rawText.slice(start, end));
        versionA = data.version_a;
        versionB = data.version_b;
      }
    }

    if (!versionA) throw new Error('Pas de cover letter generee');

    // Save to Supabase
    sb.from('upwork_jobs').update({ cover_letter: versionA, cover_letter_b: versionB }).eq('id', _job.id);
    _job.cover_letter = versionA;
    _job.cover_letter_b = versionB;

    stopGenProgress(true);
    setTimeout(function() {
      document.getElementById('genProgress').classList.remove('visible');
      showCovers(versionA, versionB);
      toast('Candidatures generees ✓');
    }, 400);

  } catch(e) {
    stopGenProgress(false);
    toast('Erreur generation: ' + e.message, 'error');
    document.getElementById('genProgress').classList.remove('visible');
    btn.style.display = '';
  }
}

    + '<button class="jd-copy-btn" onclick="copyCover(\'a\')">📋 Copier</button>'
    + '<button class="jd-copy-btn" onclick="sendCoverToExtension(\'a\')">🚀 Extension</button>'
    + '<button class="jd-copy-btn" onclick="regenerateCover()">🔄 Regenerer</button>'

    + '</div>'
    + '<div class="jd-cover-panel" id="panel-b">'
    + '<textarea class="jd-cover-text" id="cover-text-b">' + escHtml(versionB || '') + '</textarea>'
    + '<div class="jd-cover-actions">'
    + '<button class="jd-copy-btn" onclick="copyCover(\'b\')">📋 Copier</button>'
    + '<button class="jd-copy-btn" onclick="sendCoverToExtension(\'b\')">🚀 Extension</button>'
    + '</div>'
    + '</div>';
  container.classList.add('visible');
}

function switchCoverTab(tab) {
  document.querySelectorAll('.jd-cover-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.jd-cover-panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function copyCover(version) {
  var ta = document.getElementById('cover-text-' + version);
  if (!ta || !ta.value.trim()) { toast('Aucune cover letter à copier', 'error'); return; }
  navigator.clipboard.writeText(ta.value).then(function() {
    toast('Cover letter copiée ✓');
  });
}

function sendCoverToExtension(version) {
  var ta = document.getElementById('cover-text-' + version);
  if (!ta || !ta.value.trim()) { toast('Aucune cover letter', 'error'); return; }
  try {
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
      chrome.runtime.sendMessage({ type: 'SET_COVER', cover: ta.value }, function(response) {
        if (chrome.runtime.lastError) {
          localStorage.setItem('mb_last_cover', ta.value);
          toast('Cover stockee localement. Ouvre la page Upwork proposal.');
        } else {
          toast('Cover envoyee a l\'extension ✓');
        }
      });
    } else {
      localStorage.setItem('mb_last_cover', ta.value);
      toast('Cover prete. Va sur la page proposal Upwork.');
    }
  } catch(e) {
    localStorage.setItem('mb_last_cover', ta.value);
    toast('Cover stockee.');
  }
}

function regenerateCover() {
  document.getElementById('coverResults').classList.remove('visible');
  document.getElementById('coverResults').innerHTML = '';
  document.getElementById('genProgress').classList.remove('visible');
  // Reset step dots
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('gs-' + i);
    if (el) { el.classList.remove('done', 'active'); el.querySelector('.gen-step-dot').textContent = (i + 1); }
  }
  document.getElementById('genTrackFill').style.width = '0%';
  var btn = document.getElementById('generateBtn');
  if (btn) { btn.style.display = ''; }
  else {
    document.getElementById('generate-zone-inner').insertAdjacentHTML('afterbegin',
      '<button class="jd-generate-btn" id="generateBtn" onclick="generateCoverLetter()">✦ Regenerer ma candidature</button>');
  }
}

// ══════════════════════════════════════════════════════════════
// ACTIONS — Mark status
// ══════════════════════════════════════════════════════════════
async function markStatus(status) {
  if (!_job) return;
  var updates = { status: status };
  if (status === 'applied') updates.applied_at = new Date().toISOString();
  await sb.from('upwork_jobs').update(updates).eq('id', _job.id);
  _job.status = status;
  toast(status === 'applied' ? 'Marque postule ✓' : 'Job passe');
  // Update the status display in hero
  renderPage();
}
</script>
